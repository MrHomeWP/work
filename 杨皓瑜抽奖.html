<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>仙途积蕴</title>
    <style>
        :root {
            --primary-color: #5D7B6F;
            --accent-color: #8B5E3C;
            --bg-color: #F0F2F5;
            --card-bg: rgba(255, 255, 255, 0.96);
            --font-serif: "Songti SC", "STSong", "SimSun", serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: var(--font-serif);
            background-color: var(--bg-color);
            background-image:
                radial-gradient(circle at 20% 30%, rgba(139, 195, 186, 0.3) 0%, transparent 40%),
                radial-gradient(circle at 80% 20%, rgba(93, 123, 111, 0.2) 0%, transparent 40%),
                radial-gradient(circle at 50% 80%, rgba(180, 160, 140, 0.15) 0%, transparent 50%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        body::before, body::after {
            content: "";
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,255,255,0.8) 0%, transparent 70%);
            filter: blur(40px);
            z-index: 0;
        }
        body::before { top: -100px; left: -100px; }
        body::after { bottom: -100px; right: -100px; }

        .card {
            position: relative;
            z-index: 1;
            width: 90%;
            max-width: 400px;
            background: var(--card-bg);
            border-radius: 16px;
            padding: 30px 20px;
            text-align: center;
            box-shadow:
                0 20px 40px rgba(0,0,0,0.1),
                inset 0 0 0 1px rgba(255,255,255,0.5);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.8);
            overflow: hidden;
        }

        .card::before {
            content: "";
            position: absolute;
            top: 0; left: 0;
            width: 40px; height: 40px;
            border-top: 2px solid #D4AF37;
            border-left: 2px solid #D4AF37;
            border-radius: 12px 0 0 0;
        }
        .card::after {
            content: "";
            position: absolute;
            bottom: 0; right: 0;
            width: 40px; height: 40px;
            border-bottom: 2px solid #D4AF37;
            border-right: 2px solid #D4AF37;
            border-radius: 0 0 12px 0;
        }

        h1 {
            color: var(--accent-color);
            font-size: 28px;
            margin-bottom: 25px;
            letter-spacing: 2px;
            font-weight: normal;
            position: relative;
            display: inline-block;
        }

        h1::after {
            content: "";
            display: block;
            width: 60px;
            height: 1px;
            background: #D4AF37;
            margin: 10px auto 0;
            opacity: 0.6;
        }

        .avatar-container {
            position: relative;
            width: 80px;
            height: 80px;
            margin: 0 auto 15px;
        }

        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 3px solid #fff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            background: #e0f2f1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        .jade-pendant {
            width: 30px;
            height: 40px;
            background: linear-gradient(135deg, #a8e6cf 0%, #4caf50 100%);
            border-radius: 4px;
            box-shadow: inset 0 0 10px rgba(255,255,255,0.6);
            position: relative;
            animation: float 3s ease-in-out infinite;
        }
        .jade-pendant::before {
            content: "";
            position: absolute;
            top: -6px;
            left: 50%;
            transform: translateX(-50%);
            width: 12px;
            height: 6px;
            background: #ffd700;
            border-radius: 2px;
        }
        .jade-pendant::after {
            content: "";
            position: absolute;
            bottom: 5px;
            left: 50%;
            transform: translateX(-50%);
            width: 2px;
            height: 10px;
            background: rgba(255,255,255,0.8);
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        .name { font-size: 22px; color: #333; margin-bottom: 4px; font-weight: bold; }
        .level { font-size: 14px; color: #888; }

        .progress-section {
            margin: 30px 10px;
        }

        .progress-text {
            font-size: 14px;
            color: var(--accent-color);
            margin-bottom: 8px;
            display: block;
        }

        .progress-bar-bg {
            width: 100%;
            height: 16px;
            background: #f0f0f0;
            border-radius: 8px;
            border: 1px solid #e0e0e0;
            overflow: hidden;
            position: relative;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.05);
        }

        .progress-bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #81c784, #4caf50);
            border-radius: 8px;
            transition: width 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            position: relative;
        }

        .progress-bar-fill::after {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.4) 50%, transparent 100%);
            transform: translateX(-100%);
            animation: shine 2s infinite;
        }

        @keyframes shine {
            100% { transform: translateX(100%); }
        }

        .btn-group {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            margin-top: 10px;
        }

        .btn {
            padding: 12px 0;
            border-radius: 8px;
            font-family: var(--font-serif);
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 4px;
        }

        .btn:active { transform: scale(0.96); opacity: 0.8; }

        .btn-primary {
            background: #fff;
            color: var(--primary-color);
            border-color: var(--primary-color);
        }
        .btn-primary:hover { background: #f1f8f6; }

        .btn-label { font-size: 12px; opacity: 0.7; margin-top: 2px; font-weight: normal; }

        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            background-color: #f00;
            opacity: 0;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>仙途积蕴</h1>
        <div class="avatar-container">
            <div class="avatar">
                <div class="jade-pendant"></div>
            </div>
        </div>
        <div class="name">杨皓瑜</div>
        <div class="level">初入仙门 · 勤勉修行</div>
        <div class="progress-section">
            <span class="progress-text">灵力值: <span id="currentVal">0</span> / <span id="maxVal">100</span></span>
            <div class="progress-bar-bg">
                <div class="progress-bar-fill" id="progressFill"></div>
            </div>
        </div>
        <div class="btn-group">
            <button class="btn btn-primary" onclick="fetchPower()">
                同步灵力
                <span class="btn-label">从WPS表格读取</span>
            </button>
        </div>
    </div>

    <script>
        // 配置：你的WPS金山文档链接
        const WPS_URL = "https://www.kdocs.cn/l/cuhoGwiMpyIQ";

        let currentPower = 0;
        let maxPower = 100;

        const currentValEl = document.getElementById('currentVal');
        const maxValEl = document.getElementById('maxVal');
        const progressFillEl = document.getElementById('progressFill');

        // 更新界面
        function updateUI() {
            currentValEl.innerText = currentPower;
            maxValEl.innerText = maxPower;
            const percent = Math.min((currentPower / maxPower) * 100, 100);
            progressFillEl.style.width = percent + '%';

            if (currentPower >= maxPower) {
                progressFillEl.style.background = 'linear-gradient(90deg, #FFD700, #FFA500)';
                setTimeout(() => alert("恭喜道友！灵力圆满，境界突破！"), 100);
            } else {
                progressFillEl.style.background = 'linear-gradient(90deg, #81c784, #4caf50)';
            }
        }

        // 从WPS表格读取灵力（用国内无跨域代理）
        async function fetchPower() {
            try {
                // 国内免费CORS代理，支持金山文档
                const proxy = "https://api.allorigins.win/raw?url=";
                const url = proxy + encodeURIComponent(WPS_URL);
                const res = await fetch(url);
                const html = await res.text();

                // 匹配表格数据：杨皓瑜 + 现在能量 + 总能量
                const match = html.match(/杨皓瑜.*?(\d+).*?(\d+)/);
                if (match) {
                    currentPower = parseInt(match[1]) || 0;
                    maxPower = parseInt(match[2]) || 100;
                } else {
                    throw new Error("未找到数据，请检查表格格式");
                }

                updateUI();
                alert("✅ 同步成功！已从WPS表格获取最新灵力");
            } catch (err) {
                console.error("同步失败", err);
                alert("❌ 同步失败：" + err.message);
            }
        }

        // 页面加载时自动同步一次
        window.onload = function() {
            fetchPower();
        };
    </script>
</body>
</html>
