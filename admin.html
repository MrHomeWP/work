<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>表格管理后台</title>
    <style>
        body {
            max-width: 600px;
            margin: 40px auto;
            font-family: "Microsoft Yahei", sans-serif;
            padding: 0 20px;
        }
        h2 { color: #8B5E3C; text-align: center; margin-bottom: 20px; }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }
        th,td {
            border: 1px solid #ccc;
            padding: 10px;
            text-align: center;
        }
        th { background: #f5f5f5; }
        input {
            width: 90px;
            padding: 6px;
            border: 1px solid #ccc;
            border-radius: 4px;
            text-align: center;
        }
        .btn-box { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
        button {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        .add-btn { background: #4caf50; color: #fff; }
        .save-btn { background: #2d8cf0; color: #fff; }
        .del-btn { background: #f44336; color: #fff; }

        .login-box {
            border: 1px solid #ddd;
            padding: 30px;
            border-radius: 12px;
            background: #fff;
            max-width: 320px;
            margin: 80px auto;
            text-align: center;
        }
        .login-box input {
            width: 100%;
            margin: 8px 0;
            padding: 10px;
        }
        .login-btn {
            background: #8B5E3C;
            color: #fff;
            width: 100%;
            padding: 10px;
            margin-top: 10px;
        }
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

<!-- 登录：用户名 + Token -->
<div id="loginBox" class="login-box">
    <h2>管理后台登录</h2>
    <input id="username" placeholder="请输入用户名" autocomplete="off">
    <input id="token" type="password" placeholder="请输入 GitHub Token" autocomplete="off">
    <button class="login-btn" onclick="login()">登录</button>
</div>

<div id="mainPanel" class="hidden">
    <h2>在线表格管理</h2>
    <table id="roleTable">
        <thead>
            <tr>
                <th>名称</th>
                <th>当前</th>
                <th>总</th>
                <th>操作</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
    <div class="btn-box">
        <button class="add-btn" onclick="addRow()">➕ 添加</button>
        <button class="save-btn" onclick="saveData()">💾 保存全部修改</button>
    </div>
</div>

<script>
    // ========== 配置 ==========
    const REQUIRED_USERNAME = "hongweipeng";
    const repoOwner = "MrHomeWP";
    const repoName = "work";
    const fileName = "data.json";

    let GH_TOKEN = "";
    let fileSha = "";
    let tableData = [];

    // 中文 base64 兼容
    function utf8ToBase64(str) {
        return btoa(unescape(encodeURIComponent(str)));
    }

    // 本地存储登录状态（1小时免登录）
    function setLoginSession(token) {
        const expire = Date.now() + 3600 * 1000;
        localStorage.setItem("admin_token", token);
        localStorage.setItem("admin_expire", expire);
    }

    function getLoginSession() {
        const token = localStorage.getItem("admin_token");
        const expire = localStorage.getItem("admin_expire");
        if (!token || !expire || Date.now() > expire) {
            logout();
            return null;
        }
        return token;
    }

    function logout() {
        localStorage.removeItem("admin_token");
        localStorage.removeItem("admin_expire");
    }

    // 自动登录
    window.onload = function () {
        const token = getLoginSession();
        if (token) {
            GH_TOKEN = token;
            document.getElementById("loginBox").classList.add("hidden");
            document.getElementById("mainPanel").classList.remove("hidden");
            loadData();
        }
    };

    // 登录
    async function login() {
        const user = document.getElementById("username").value.trim();
        const token = document.getElementById("token").value.trim();

        if (user !== REQUIRED_USERNAME) {
            alert("用户名不正确");
            return;
        }
        if (!token) {
            alert("请输入 Token");
            return;
        }

        // 验证 Token
        try {
            const test = await fetch(`https://api.github.com/repos/${repoOwner}/${repoName}/contents/${fileName}`, {
                headers: { Authorization: "token " + token }
            });
            if (!test.ok) throw new Error("Token 无效");

            GH_TOKEN = token;
            setLoginSession(token);
            document.getElementById("loginBox").classList.add("hidden");
            document.getElementById("mainPanel").classList.remove("hidden");
            await loadData();
        } catch (e) {
            alert("Token 无效或无权限");
        }
    }

    // 加载最新数据
    async function loadData() {
        try {
            const res = await fetch(`https://${repoOwner}.github.io/${repoName}/${fileName}`);
            tableData = await res.json();

            const info = await fetch(`https://api.github.com/repos/${repoOwner}/${repoName}/contents/${fileName}`, {
                headers: { Authorization: "token " + GH_TOKEN }
            });
            const json = await info.json();
            fileSha = json.sha;
            renderTable();
        } catch (e) {
            alert("加载失败：" + e.message);
        }
    }

    function renderTable() {
        const tbody = document.querySelector("#roleTable tbody");
        tbody.innerHTML = "";
        tableData.forEach((item, idx) => {
            const tr = document.createElement("tr");
            tr.innerHTML = `
                <td><input value="${item.name}" data-key="name" data-index="${idx}"></td>
                <td><input type="number" value="${item.currentPower}" data-key="currentPower" data-index="${idx}"></td>
                <td><input type="number" value="${item.maxPower}" data-key="maxPower" data-index="${idx}"></td>
                <td><button class="del-btn" onclick="delRow(${idx})">删除</button></td>
            `;
            tbody.appendChild(tr);
        });
    }

    function addRow() {
        tableData.push({ name: "新角色", currentPower: 0, maxPower: 100 });
        renderTable();
    }

    function delRow(idx) {
        tableData.splice(idx, 1);
        renderTable();
    }

    // 保存并自动刷新
    async function saveData() {
        try {
            const inputs = document.querySelectorAll("#roleTable tbody input");
            inputs.forEach(inp => {
                const idx = Number(inp.dataset.index);
                const key = inp.dataset.key;
                tableData[idx][key] = key === "name" ? inp.value : Number(inp.value);
            });

            const content = utf8ToBase64(JSON.stringify(tableData, null, 2));

            await fetch(`https://api.github.com/repos/${repoOwner}/${repoName}/contents/${fileName}`, {
                method: "PUT",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": "token " + GH_TOKEN
                },
                body: JSON.stringify({
                    message: "后台更新数据",
                    content: content,
                    sha: fileSha
                })
            });

            alert("✅ 保存成功！正在刷新最新数据...");
            await loadData(); // 保存后自动刷新
        } catch (e) {
            alert("保存失败：" + e.message);
        }
    }
</script>
</body>
</html>
