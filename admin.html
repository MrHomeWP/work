<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>表格管理后台</title>
    <style>
        body {
            max-width: 600px;
            margin: 40px auto;
            font-family: "Microsoft Yahei", sans-serif;
            padding: 0 20px;
        }
        h2 { color: #8B5E3C; text-align: center; margin-bottom: 20px; }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }
        th,td {
            border: 1px solid #ccc;
            padding: 10px;
            text-align: center;
        }
        th { background: #f5f5f5; }
        input {
            width: 90px;
            padding: 6px;
            border: 1px solid #ccc;
            border-radius: 4px;
            text-align: center;
        }
        .btn-box { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
        button {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        .add-btn { background: #4caf50; color: #fff; }
        .save-btn { background: #2d8cf0; color: #fff; }
        .del-btn { background: #f44336; color: #fff; }

        /* 登录样式 */
        .login-box {
            border: 1px solid #ddd;
            padding: 30px;
            border-radius: 12px;
            background: #fff;
            max-width: 320px;
            margin: 80px auto;
            text-align: center;
        }
        .login-box input {
            width: 100%;
            margin: 8px 0;
            padding: 10px;
        }
        .login-btn {
            background: #8B5E3C;
            color: #fff;
            width: 100%;
            padding: 10px;
            margin-top: 10px;
        }
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

<!-- 登录界面 -->
<div id="loginBox" class="login-box">
    <h2>管理后台登录</h2>
    <input id="user" placeholder="账号">
    <input id="pwd" type="password" placeholder="密码">
    <button class="login-btn" onclick="login()">登录</button>
</div>

<!-- 表格（默认隐藏） -->
<div id="mainPanel" class="hidden">
    <h2>在线表格管理</h2>

    <table id="roleTable">
        <thead>
            <tr>
                <th>名称</th>
                <th>当前</th>
                <th>总</th>
                <th>操作</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <div class="btn-box">
        <button class="add-btn" onclick="addRow()">➕ 添加</button>
        <button class="save-btn" onclick="saveData()">💾 保存全部修改</button>
    </div>
</div>

<script>
    // ========== 登录配置 ==========
    const USERNAME = "hongweipeng";
    const PASSWORD = "hxs1314";
    // ==============================

    // 仓库配置
    const repoOwner = "MrHomeWP";
    const repoName = "work";
    const fileName = "data.json";
    let fileSha = "";
    let tableData = [];

    // 登录
    function login() {
        const u = document.getElementById("user").value;
        const p = document.getElementById("pwd").value;
        if (u === USERNAME && p === PASSWORD) {
            document.getElementById("loginBox").classList.add("hidden");
            document.getElementById("mainPanel").classList.remove("hidden");
            loadData();
        } else {
            alert("账号或密码错误");
        }
    }

    // 读取线上JSON
    async function loadData() {
        const res = await fetch(`https://${repoOwner}.github.io/${repoName}/${fileName}`);
        tableData = await res.json();
        const info = await fetch(`https://api.github.com/repos/${repoOwner}/${repoName}/contents/${fileName}`);
        const json = await info.json();
        fileSha = json.sha;
        renderTable();
    }

    // 渲染表格
    function renderTable() {
        const tbody = document.querySelector("#roleTable tbody");
        tbody.innerHTML = "";
        tableData.forEach((item, idx) => {
            const tr = document.createElement("tr");
            tr.innerHTML = `
                <td><input value="${item.name}" data-key="name" data-index="${idx}"></td>
                <td><input type="number" value="${item.currentPower}" data-key="currentPower" data-index="${idx}"></td>
                <td><input type="number" value="${item.maxPower}" data-key="maxPower" data-index="${idx}"></td>
                <td><button class="del-btn" onclick="delRow(${idx})">删除</button></td>
            `;
            tbody.appendChild(tr);
        });
    }

    // 添加空行
    function addRow() {
        tableData.push({
            name: "默认名称",
            currentPower: 0,
            maxPower: 100
        });
        renderTable();
    }

    // 删除行
    function delRow(idx) {
        tableData.splice(idx, 1);
        renderTable();
    }

    // 保存到GitHub data.json
    async function saveData() {
        const inputs = document.querySelectorAll("#roleTable tbody input");
        inputs.forEach(inp => {
            const idx = Number(inp.dataset.index);
            const key = inp.dataset.key;
            tableData[idx][key] = key === "name" ? inp.value : Number(inp.value);
        });

        const content = btoa(JSON.stringify(tableData, null, 2));

        await fetch(`https://api.github.com/repos/${repoOwner}/${repoName}/contents/${fileName}`, {
            method: "PUT",
            headers: {
                "Content-Type": "application/json",
                "Accept": "application/vnd.github+json"
            },
            body: JSON.stringify({
                message: "后台表格更新数据",
                content: content,
                sha: fileSha
            })
        });
        alert("✅ 保存成功！主页可同步全部数据");
        loadData();
    }
</script>
</body>
</html>
