<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>表格管理后台</title>
    <style>
        body {
            max-width: 600px;
            margin: 40px auto;
            font-family: "Microsoft Yahei", sans-serif;
            padding: 0 20px;
        }
        h2 { color: #8B5E3C; text-align: center; margin-bottom: 20px; }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }
        th,td {
            border: 1px solid #ccc;
            padding: 10px;
            text-align: center;
        }
        th { background: #f5f5f5; }
        input {
            width: 90px;
            padding: 6px;
            border: 1px solid #ccc;
            border-radius: 4px;
            text-align: center;
        }
        .btn-box { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
        button {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        .add-btn { background: #4caf50; color: #fff; }
        .save-btn { background: #2d8cf0; color: #fff; }
        .del-btn { background: #f44336; color: #fff; }

        .login-box {
            border: 1px solid #ddd;
            padding: 30px;
            border-radius: 12px;
            background: #fff;
            max-width: 320px;
            margin: 80px auto;
            text-align: center;
        }
        .login-box input {
            width: 100%;
            margin: 8px 0;
            padding: 10px;
        }
        .login-btn {
            background: #8B5E3C;
            color: #fff;
            width: 100%;
            padding: 10px;
            margin-top: 10px;
        }
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

<div id="loginBox" class="login-box">
    <h2>管理后台登录</h2>
    <input id="user" placeholder="账号">
    <input id="pwd" type="password" placeholder="密码">
    <input id="token" type="password" placeholder="GitHub Token">
    <button class="login-btn" onclick="login()">登录</button>
</div>

<div id="mainPanel" class="hidden">
    <h2>在线表格管理</h2>
    <table id="roleTable">
        <thead>
            <tr>
                <th>名称</th>
                <th>当前</th>
                <th>总</th>
                <th>操作</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
    <div class="btn-box">
        <button class="add-btn" onclick="addRow()">➕ 添加</button>
        <button class="save-btn" onclick="saveData()">💾 保存全部修改</button>
    </div>
</div>

<script>
    // 固定登录信息
    const REAL_USER = "hongweipeng";
    const REAL_PWD = "hxs1314";

    // 仓库信息
    const repoOwner = "MrHomeWP";
    const repoName = "work";
    const fileName = "data.json";

    let GH_TOKEN = "";
    let fileSha = "";
    let tableData = [];

    // 兼容中文的base64编码
    function utf8ToBase64(str) {
        return btoa(unescape(encodeURIComponent(str)));
    }

    // 登录
    async function login() {
        let u = document.getElementById("user").value;
        let p = document.getElementById("pwd").value;
        let t = document.getElementById("token").value;

        if (u === REAL_USER && p === REAL_PWD && t) {
            GH_TOKEN = t;
            document.getElementById("loginBox").classList.add("hidden");
            document.getElementById("mainPanel").classList.remove("hidden");
            await loadData();
        } else {
            alert("账号、密码或Token不能为空/错误");
        }
    }

    // 加载数据
    async function loadData() {
        try {
            let res = await fetch(`https://${repoOwner}.github.io/${repoName}/${fileName}`);
            tableData = await res.json();

            let info = await fetch(`https://api.github.com/repos/${repoOwner}/${repoName}/contents/${fileName}`, {
                headers: { Authorization: "token " + GH_TOKEN }
            });
            let json = await info.json();
            fileSha = json.sha;
            renderTable();
        } catch (e) {
            alert("加载失败：" + e.message);
        }
    }

    // 渲染表格
    function renderTable() {
        let tbody = document.querySelector("#roleTable tbody");
        tbody.innerHTML = "";
        tableData.forEach((item, idx) => {
            let tr = document.createElement("tr");
            tr.innerHTML = `
                <td><input value="${item.name}" data-key="name" data-index="${idx}"></td>
                <td><input type="number" value="${item.currentPower}" data-key="currentPower" data-index="${idx}"></td>
                <td><input type="number" value="${item.maxPower}" data-key="maxPower" data-index="${idx}"></td>
                <td><button class="del-btn" onclick="delRow(${idx})">删除</button></td>
            `;
            tbody.appendChild(tr);
        });
    }

    // 添加角色
    function addRow() {
        tableData.push({ name: "默认名称", currentPower: 0, maxPower: 100 });
        renderTable();
    }

    // 删除角色
    function delRow(idx) {
        tableData.splice(idx, 1);
        renderTable();
    }

    // 保存数据到GitHub（已修复中文编码）
    async function saveData() {
        try {
            let inputs = document.querySelectorAll("#roleTable tbody input");
            inputs.forEach(inp => {
                let idx = Number(inp.dataset.index);
                let key = inp.dataset.key;
                tableData[idx][key] = key === "name" ? inp.value : Number(inp.value);
            });

            // 关键修复：中文转base64
            let jsonStr = JSON.stringify(tableData, null, 2);
            let content = utf8ToBase64(jsonStr);

            await fetch(`https://api.github.com/repos/${repoOwner}/${repoName}/contents/${fileName}`, {
                method: "PUT",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": "token " + GH_TOKEN
                },
                body: JSON.stringify({
                    message: "后台更新数据",
                    content: content,
                    sha: fileSha
                })
            });

            alert("✅ 保存成功！");
            loadData();
        } catch (e) {
            alert("保存失败：" + e.message);
            console.error(e);
        }
    }
</script>
</body>
</html>
